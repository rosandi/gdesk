<!DOCTYPE html>
<html>

<head>
	<title>{{ hpcname }}</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8"/>
<link rel="icon" href="/favicon.ico" type="image/x-icon" >
{% block styles %}
  <link rel="stylesheet" href="{{ url_for('static', filename='guriang.css') }}">
{% endblock %}
{% block scripts %}
  <script src="{{ url_for('static', filename='yrtool.js') }}"></script>
{% endblock %}
</head>
<body>

<header>
	{% include 'header.html' %}
</header>

<div id='maincontent'>
{% block content %}
HPC site content
{% endblock %}
</div>

<footer>
	{% include 'footer.html' %}
</footer>

<!-- reserved for modal dialog -->
<div id='dlgplace'></div>
<div id='ctrlButton'></div>

{% block userscript %}
{% if session['username'] %}
<script src="{{ url_for('static', filename='userpage.js') }}"></script>
<script src="{{ url_for('static', filename='filebrowser.js') }}"></script>
<script src="{{ url_for('static', filename='uproject.js') }}"></script>
{% endif %}
{% endblock %}

<input id='username' type='hidden' value='{{ username }}'>

</body>

</html>
