<div class='infotext'>Edit stage: id={{id}}</div>
<div class='control-group'>
        <button id='rm-{{id}}'>delete</button>
        <button id='accept-{{id}}'>accept</button>
        <span id='chart-status'></span>
</div>

<div class='project_editcard'>
        <div style='display:flex;gap:10px'>

        <!-- name -->
        <div class='input-group'>
                <label for='name-{{id}}'>Stage Chart name</label>
                <input type='text' id='name-{{id}}' {{name}}>
        </div>

        <!-- type -->
        <div class='input-group'>
                <label for='type-{{id}}'>Chart type</label>
                <select id='type-{{id}}' type='text'>
                        <option value='executor'>Executor</option>
                        <option value='validator'>Validator</option>
                        <option value='provider'>Provider</option>
                        <option value='analyst'>Analyst</option>
                </select>
        </div>

        </div>

        <div id='form-{{id}}'></div>
        <div>
                <input type='checkbox' id='bypass-{{id}}' {{act}}>
                <label for='bypass-{{id}}'>bypass</label>
        </div>
</div>
