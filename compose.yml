services:
  ghpcdesk:
    image: rosandi/gdesk
    build:
      context: .

    hostname: gdesk
    container_name: gdesk
    ports:
      - 80:5000
    environment:
      - GAPIKEY=gu35tWh4tt0d0

    volumes:
      - ./ghpc-config.json:/etc/ghpc-config.json
      - ./:/opt/ghpc
      - hpcdata:/var/hpcdata
      - homedisk:/home/

volumes:
  homedisk:
  hpcdata:
